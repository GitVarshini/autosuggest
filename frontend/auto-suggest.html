<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeingInfinity</title>
</head>
<style>
        body {
            margin: 0;
        }
        .container {
            padding: 20px;
        }
        .icons-row {
            margin-bottom: 20px; 
            display: flex;
            justify-content: space-between;
        }
        h1 {
            text-align: center;
            margin: 50px 0 20px 0;
            font-size: 2.5em;
            line-height: 1.2;
            letter-spacing: 0.05em;
        }
        p {
            text-align: center;
            margin: 0 0 30px 0;
            font-size: 1em;
            line-height: 1.4; 
        }
        .search-box {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .search-input-wrap {
            position: relative;
            width: 40%;
            min-width: 280px;
        }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            pointer-events: none;
        }
        input {
            width: 100%;
            height: 44px;
            border-radius: 999px;
            border: 1px solid #000;
            padding: 10px 16px 10px 42px;
            box-sizing: border-box;
            font-size: 15px;
        }
        .suggestions-box {
            display: none;
            width: 36%;
            min-width: 240px;
            margin: 8px auto 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            padding: 8px 0;
            text-align: left;
            min-height: 56px;
            color: #6b7280;
            font-size: 14px;
            overflow: hidden;
        }
        .suggestions-box.show {
            display: block;
        }
        .suggestion-item {
            padding: 10px 12px;
            cursor: pointer;
            color: #111827;
        }
        .suggestion-item:hover {
            background: #f3f4f6;
        }
        .suggestion-empty {
            padding: 10px 12px;
            color: #6b7280;
        }
        .being {
            color: #007BFF; 
        }
        .infinity {
            color: black; 
        }
    </style>
</body>
</html>
<body>
        <div class="icons-row">
            <span class="gear-icon">&#9881;</span>
            <span class="status-icons">&#8226; online | &#9202; ms</span>
        </div>

        <div style="text-align: center;">
            <h1>
                <span class="being">Varshini</span><span class="infinity">Amudala</span>
            </h1>
            <p>One million phrases. Four algorithms. Prefix-based auto suggest.</p>
            
            <div id="search-box-container" class="search-box">
                <div class="search-input-wrap">
                    <span class="search-icon">🔎</span>
                    <input id="search-input" type="text" placeholder="Start typing to search...">
                </div>
            </div>
            <div id="suggestions-container" class="suggestions-box">Suggestions will appear here</div>
        </div>

        <script>
            var searchBox = document.getElementById("search-input");
            var suggestionsBox = document.getElementById("suggestions-container");

            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/\"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function showSuggestions(items) {
                if (!items || items.length === 0) {
                    suggestionsBox.innerHTML = '<div class="suggestion-empty">No suggestions found</div>';
                    suggestionsBox.classList.add("show");
                    return;
                }

                suggestionsBox.innerHTML = items.map(function(item) {
                    var text = typeof item === "string"
                        ? item
                        : (item.text || item.value || item.suggestion || item.word || "");
                    return '<div class="suggestion-item">' + escapeHtml(text) + '</div>';
                }).join("");

                suggestionsBox.classList.add("show");
            }

            searchBox.addEventListener("input", async function() {
                var userInput = searchBox.value.trim();

                if (!userInput) {
                    suggestionsBox.innerHTML = "";
                    suggestionsBox.classList.remove("show");
                    return;
                }

                suggestionsBox.innerHTML = '<div class="suggestion-empty">Loading...</div>';
                suggestionsBox.classList.add("show");

                try {
                    var apiUrl = "https://autosuggest-backend.onrender.com/api/autosuggest?q=" + encodeURIComponent(userInput) + "&algorithm=brute&limit=10&weighted=false";
                    var response = await fetch(apiUrl);

                    if (!response.ok) {
                        throw new Error("Failed to fetch suggestions");
                    }

                    var data = await response.json();
                    var suggestions = Array.isArray(data) ? data : (data.suggestions || data.results || []);
                    showSuggestions(suggestions);
                } catch (error) {
                    console.error(error);
                    suggestionsBox.innerHTML = '<div class="suggestion-empty">Unable to load suggestions</div>';
                    suggestionsBox.classList.add("show");
                }
            });
        </script>
</body>
